<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORE_OS // PYTHON 3.14</title>
    <style>
        :root { --neon: #00f2ff; --bg: #020617; --accent: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Consolas', monospace; overflow: hidden; height: 100vh;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.3; }

        .interface {
            position: relative; z-index: 10; height: 100vh; 
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        
        /* The High-Speed Clock */
        #clock { font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px var(--neon); }

        .main-hero { text-align: center; margin-top: 10vh; }
        .glitch {
            font-size: 6rem; font-weight: 900; letter-spacing: 15px;
            position: relative; animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(2deg); text-shadow: 2px 0 red; }
            40% { transform: skew(-2deg); text-shadow: -2px 0 blue; }
            100% { transform: skew(0deg); }
        }

        .stats-hub { 
            display: flex; gap: 40px; justify-content: center; margin-top: 50px;
        }
        .stat-card { 
            background: rgba(0, 242, 255, 0.05); padding: 20px 40px; 
            border: 1px solid var(--neon); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* Custom Cursor */
        #cursor {
            position: fixed; width: 40px; height: 40px;
            border: 2px solid var(--neon); border-radius: 50%;
            pointer-events: none; transition: 0.1s; z-index: 999;
            box-shadow: 0 0 20px var(--neon);
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="interface">
        <div class="header">
            <div>[ STATUS: <span style="color: #00ff88;">ENCRYPTED_LINK</span> ]</div>
            <div id="clock">00:00:00:000</div>
        </div>

        <div class="main-hero">
            <p style="letter-spacing: 10px; opacity: 0.5;">AZURE_APP_SERVICE_v3.14</p>
            <h1 class="glitch">NEURAL.CORE</h1>
            
            <div class="stats-hub">
                <div class="stat-card">
                    <small>CPU_LOAD</small>
                    <div id="cpu">0%</div>
                </div>
                <div class="stat-card">
                    <small>MEM_ALLOC</small>
                    <div id="ram">0MB</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>>> LOCATION: AZURE_CLOUD_FABRIC // NODE_ALPHA</p>
        </div>
    </div>

    <script>
        // 1. Digital Rain Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawRain() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawRain, 30);

        // 2. High-Speed Clock
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0') + ":" + 
                         now.getSeconds().toString().padStart(2, '0') + ":" + 
                         now.getMilliseconds().toString().padStart(3, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1);

        // 3. Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';
        });

        // 4. API Telemetry
        async function fetchStats() {
            try {
                const res = await fetch('/api/telemetry');
                const data = await res.json();
                document.getElementById('cpu').innerText = data.cpu;
                document.getElementById('ram').innerText = data.ram;
            } catch (e) { console.log("Waiting for Azure API..."); }
        }
        setInterval(fetchStats, 2000);
    </script>
</body>
</html>
